version: '3.8'

services:
  # Main test execution service
  playwright-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencart-tests
    volumes:
      - .:/app
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    environment:
      - CI=false
      - TEST_ENV=demo
      - HEADLESS=true
    command: npm test
    networks:
      - test-network

  # Test execution for different environments
  demo-tests:
    extends:
      service: playwright-tests
    container_name: opencart-demo-tests
    environment:
      - TEST_ENV=demo
      - HEADLESS=true
    command: npm run test:demo

  staging-tests:
    extends:
      service: playwright-tests
    container_name: opencart-staging-tests
    environment:
      - TEST_ENV=staging
      - HEADLESS=true
    command: npm run test:staging

  # Security tests
  security-tests:
    extends:
      service: playwright-tests
    container_name: opencart-security-tests
    environment:
      - TEST_ENV=demo
      - HEADLESS=true
    command: npm run test:security

  # Performance tests
  performance-tests:
    extends:
      service: playwright-tests
    container_name: opencart-performance-tests
    environment:
      - TEST_ENV=demo
      - HEADLESS=true
    command: npm run test:performance

  # Cross-browser testing
  chromium-tests:
    extends:
      service: playwright-tests
    container_name: opencart-chromium-tests
    command: npx playwright test --project=chromium

  firefox-tests:
    extends:
      service: playwright-tests
    container_name: opencart-firefox-tests
    command: npx playwright test --project=firefox

  webkit-tests:
    extends:
      service: playwright-tests
    container_name: opencart-webkit-tests
    command: npx playwright test --project=webkit

  # Test report server (optional)
  report-server:
    extends:
      service: playwright-tests
    container_name: opencart-report-server
    ports:
      - "9323:9323"
    command: npx playwright show-report --host 0.0.0.0 --port 9323
    depends_on:
      - playwright-tests

networks:
  test-network:
    driver: bridge

volumes:
  test-results:
  playwright-report:
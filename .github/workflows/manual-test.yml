name: 🎯 Manual Test Execution

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test Type'
        required: true
        default: 'login'
        type: choice
        options:
          - login
          - security
          - performance
          - smoke
          - cross-browser
          - all
      environment:
        description: 'Test Environment'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - staging
          - production
      browser:
        description: 'Browser'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all
      generate_dashboard:
        description: 'Generate Dashboard'
        required: false
        default: true
        type: boolean
      log_to_jira:
        description: 'Log Failures to Jira'
        required: false
        default: false
        type: boolean

env:
  CI: true
  NODE_VERSION: '20'

jobs:
  execute-tests:
    name: 🚀 Execute Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies & browsers
        run: |
          npm ci
          npx playwright install --with-deps

      - name: 🧪 Execute test suite
        env:
          TEST_ENV: ${{ github.event.inputs.environment }}
        run: |
          TEST_TYPE="${{ github.event.inputs.test_type }}"
          BROWSER="${{ github.event.inputs.browser }}"
          
          echo "🎯 Running $TEST_TYPE tests on $BROWSER in $TEST_ENV environment"
          
          if [ "$BROWSER" == "all" ]; then
            BROWSER_FLAG=""
          else
            BROWSER_FLAG="--project=$BROWSER"
          fi
          
          case "$TEST_TYPE" in
            "login")
              npm run test:login $BROWSER_FLAG
              ;;
            "security")
              npm run test:security $BROWSER_FLAG
              ;;
            "performance")
              npm run test:performance $BROWSER_FLAG
              ;;
            "smoke")
              npm run test:smoke $BROWSER_FLAG
              ;;
            "cross-browser")
              npm run test:cross-browser
              ;;
            "all")
              npm test $BROWSER_FLAG
              ;;
            *)
              echo "Unknown test type: $TEST_TYPE"
              exit 1
              ;;
          esac
        continue-on-error: true

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manual-test-results-${{ github.event.inputs.test_type }}-${{ github.event.inputs.browser }}-${{ github.event.inputs.environment }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  generate-dashboard:
    name: 📊 Generate Dashboard
    runs-on: ubuntu-latest
    needs: execute-tests
    if: github.event.inputs.generate_dashboard == 'true'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: "manual-test-results-*"
          merge-multiple: true
          path: ./test-results

      - name: 📊 Generate dashboard
        run: |
          npm run generate-dashboard || echo "Dashboard generation failed"
          npm run generate-impact-analysis || echo "Impact analysis failed"

      - name: 📊 Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: manual-test-dashboard
          path: |
            dashboard/
            interactive-test-dashboard.html
          retention-days: 30

  jira-integration:
    name: 🎟️ Jira Integration
    runs-on: ubuntu-latest
    needs: execute-tests
    if: github.event.inputs.log_to_jira == 'true' && failure()
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: "manual-test-results-*"
          merge-multiple: true
          path: ./test-results

      - name: 🎟️ Log failures to Jira
        env:
          JIRA_HOST: ${{ secrets.JIRA_HOST || 'mercator-team-nair.atlassian.net' }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'DM06032026' }}
        run: |
          if [ -n "$JIRA_EMAIL" ] && [ -n "$JIRA_API_TOKEN" ]; then
            npm run jira:log-defects || echo "Failed to log defects to Jira"
          else
            echo "⚠️ JIRA credentials not configured"
          fi

  summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [execute-tests, generate-dashboard, jira-integration]
    if: always()
    steps:
      - name: 📊 Calculate test metrics
        id: metrics
        run: |
          EXECUTE_STATUS="${{ needs.execute-tests.result }}"
          DASHBOARD_STATUS="${{ needs.generate-dashboard.result }}"
          JIRA_STATUS="${{ needs.jira-integration.result }}"
          
          if [ "$EXECUTE_STATUS" == "success" ]; then
            echo "test_result=✅ PASSED" >> $GITHUB_OUTPUT
          else
            echo "test_result=❌ FAILED" >> $GITHUB_OUTPUT
          fi

      - name: 📋 Create execution summary
        run: |
          echo "## 🎯 Manual Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Result:** ${{ steps.metrics.outputs.test_result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Type:** ${{ github.event.inputs.test_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Browser:** ${{ github.event.inputs.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Job Results:" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Execution:** ${{ needs.execute-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard Generation:** ${{ needs.generate-dashboard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Jira Integration:** ${{ needs.jira-integration.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources:" >> $GITHUB_STEP_SUMMARY
          echo "- [Test Results Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.inputs.generate_dashboard }}" == "true" ]; then
            echo "- [Test Dashboard](http://localhost:8083/interactive-test-dashboard.html)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ github.event.inputs.log_to_jira }}" == "true" ]; then
            echo "- [Jira Board](https://mercator-team-nair.atlassian.net/jira/software/c/projects/DM06032026/boards/199/backlog)" >> $GITHUB_STEP_SUMMARY
          fi
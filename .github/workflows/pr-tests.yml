name: Pull Request Tests

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tests/**'
      - 'specs/**'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/**'

jobs:
  pr-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run smoke tests (Chromium only)
      env:
        TEST_ENV: demo
        CI: true
      run: npx playwright test tests/login/successful-login.spec.ts --project=chromium --reporter=html,json

    - name: Upload PR test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pr-test-results
        path: |
          playwright-report/
          test-results/
        retention-days: 7

    - name: Comment PR with results
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const fs = require('fs');
          let testResults = 'Test execution completed';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🧪 PR Test Results
            
            **Status**: ${{ job.status }}
            **Environment**: Demo
            **Browser**: Chromium
            
            ✅ **Tests Executed**: Login functionality smoke tests
            📊 **Results**: Check artifacts for detailed report
            🔗 **Full Report**: Available in workflow artifacts
            
            > This is an automated comment from the CI/CD pipeline.`
          });